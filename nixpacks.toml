[phases.setup]
nixPkgs = ["python3", "gcc", "curl", "gnutar", "gzip", "bash"]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install -r requirements.txt",
  "bash docs/scripts/fetch-assets.sh"
]

[phases.build]
cmds = [". /opt/venv/bin/activate && mkdocs build --strict"]

[start]
cmd = ". /opt/venv/bin/activate && python -m http.server ${PORT:-8000} --directory site"
